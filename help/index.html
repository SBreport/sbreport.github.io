<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유지보수 가이드 — 스마트브랜딩 페이지 모음</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>
<body>
  <a id="home-link" href="../" title="홈으로">← 홈</a>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="hb-brand">스마트브랜딩</div>
      <h2>유지보수 가이드</h2>
      <input type="search" id="toc-search" placeholder="섹션 검색..." />
    </div>
    <nav id="toc"></nav>
    <div class="sidebar-footer">
      <a href="https://github.com/SBreport/sbreport.github.io" target="_blank" rel="noopener">GitHub에서 보기 →</a>
    </div>
  </aside>

  <main id="content-wrapper">
    <article id="content">
      <p class="loading">README.md 불러오는 중...</p>
    </article>
    <footer>
      <button id="theme-toggle" aria-label="다크모드 전환">
        <span class="theme-icon">🌙</span> <span class="theme-label">다크</span>
      </button>
      <button id="print-btn" aria-label="인쇄">🖨 인쇄</button>
      <button id="top-btn" aria-label="맨 위로">↑ Top</button>
    </footer>
  </main>

  <button id="toc-toggle" aria-label="목차 열기/닫기">☰ 목차</button>

  <script>
    // ===== README.md 로드 =====
    async function loadReadme() {
      try {
        const res = await fetch('../README.md?t=' + Date.now());
        if (!res.ok) throw new Error('README.md 로드 실패 (' + res.status + ')');
        const md = await res.text();

        marked.setOptions({ gfm: true, breaks: false });
        const renderer = new marked.Renderer();
        const slugify = (text) => {
          const stripped = String(text).replace(/<[^>]+>/g, '');
          return 'h-' + stripped.trim().replace(/\s+/g, '-').replace(/[^\w가-힣\-]/g, '');
        };
        renderer.heading = (text, level) => {
          const id = slugify(text);
          return `<h${level} id="${id}">${text}</h${level}>`;
        };

        document.getElementById('content').innerHTML = marked.parse(md, { renderer });
        buildTOC();
        observeHeadings();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="error">⚠ ${err.message}<br><br>` +
          `브라우저에서 직접 열면 fetch가 차단됩니다.<br>` +
          `리포 루트에서 <code>python -m http.server 8000</code> 실행 후 ` +
          `<code>http://localhost:8000/help/</code> 접속하세요.</div>`;
      }
    }

    // ===== TOC 자동 생성 (h1, h2, h3) =====
    function buildTOC() {
      const headings = document.querySelectorAll('#content h1, #content h2, #content h3');
      const toc = document.getElementById('toc');
      const ul = document.createElement('ul');
      headings.forEach(h => {
        const li = document.createElement('li');
        li.className = 'toc-' + h.tagName.toLowerCase();
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + h.id);
          if (window.innerWidth < 900) document.body.classList.remove('sidebar-open');
        });
        li.appendChild(a);
        ul.appendChild(li);
      });
      toc.innerHTML = '';
      toc.appendChild(ul);
    }

    document.getElementById('toc-search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('#toc li').forEach(li => {
        const match = li.textContent.toLowerCase().includes(q);
        li.style.display = match ? '' : 'none';
      });
    });

    document.getElementById('toc-toggle').addEventListener('click', () => {
      document.body.classList.toggle('sidebar-open');
    });

    // 다크모드
    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      const icon = document.querySelector('#theme-toggle .theme-icon');
      const label = document.querySelector('#theme-toggle .theme-label');
      if (icon && label) {
        icon.textContent = theme === 'dark' ? '☀' : '🌙';
        label.textContent = theme === 'dark' ? '라이트' : '다크';
      }
    }
    applyTheme(localStorage.getItem('theme') || 'light');
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    document.getElementById('print-btn').addEventListener('click', () => window.print());
    document.getElementById('top-btn').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 스크롤 시 현재 섹션 하이라이트
    let observer = null;
    function observeHeadings() {
      if (observer) observer.disconnect();
      observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            document.querySelectorAll('#toc a').forEach(a => {
              a.classList.toggle('active', a.getAttribute('href') === '#' + id);
            });
          }
        });
      }, { rootMargin: '-30% 0px -60% 0px' });
      document.querySelectorAll('#content h1, #content h2, #content h3').forEach(h => observer.observe(h));
    }

    loadReadme();
  </script>
</body>
</html>
