name = "smartsupport"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat", "no_nodejs_compat_v2"]

# Nitro cloudflare_module preset 빌드 산출물 경로 (루트 기준 상대 경로)
# Cloudflare가 npx wrangler deploy를 루트에서 실행할 때 사용
main = ".output/server/index.mjs"

[assets]
directory = ".output/public"
binding = "ASSETS"
