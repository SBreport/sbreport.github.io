<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 브랜딩 서포터 — 베타 종료 안내</title>
<style>
:root {
  --brand: #1684F2;
  --brand-dark: #0d6fd9;
  --text: #1a1a1a;
  --text-muted: #666;
  --bg: #f5f7fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.card {
  max-width: 480px;
  width: 100%;
  background: #fff;
  border-radius: 14px;
  padding: 48px 36px 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  text-align: center;
}
.icon {
  width: 96px;
  height: 96px;
  margin: 0 auto 24px;
  border-radius: 22px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon img {
  width: 100%;
  height: 100%;
  display: block;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.subtitle {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  margin-bottom: 28px;
  text-transform: uppercase;
}
.message {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 32px;
  padding: 18px 20px;
  background: #f0f7ff;
  border-radius: 10px;
  border-left: 3px solid var(--brand);
  text-align: left;
  line-height: 1.7;
}
.message strong {
  color: var(--brand);
  font-weight: 700;
}
.cta {
  display: inline-block;
  background: var(--brand);
  color: #fff;
  padding: 14px 36px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  transition: background 0.15s, transform 0.1s;
  border: none;
  cursor: pointer;
  font-family: inherit;
}
.cta:hover { background: var(--brand-dark); }
.cta:active { transform: scale(0.98); }
.cta-secondary {
  display: inline-block;
  margin-top: 10px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  padding: 8px 12px;
}
.cta-secondary:hover { color: var(--text); }
.footer {
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<main class="card">
  <div class="icon"><img src="icon.png" alt="스마트 브랜딩 서포터"></div>
  <h1>스마트 브랜딩 서포터</h1>
  <p class="subtitle">Beta Notice</p>
  <div class="message">
    <strong>베타 버전이 종료되었습니다.</strong><br>
    더 안정적인 정식 버전이 준비 중이며,<br>
    크롬 웹스토어를 통해 곧 출시될 예정입니다.<br><br>
    그동안 베타 사용으로 함께해주신<br>
    여러분께 진심으로 감사드립니다.
  </div>
  <a href="#" class="cta" id="storeLink">정식 버전 출시 알림 받기 →</a>
  <div>
    <a href="https://sbreport.github.io/" class="cta-secondary">사이트 메인으로 ←</a>
  </div>
  <p class="footer">SBreport · 2026</p>
</main>
</body>
</html>
