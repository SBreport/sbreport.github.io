name = "naver-searchad-proxy"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 비밀 키는 wrangler.toml에 절대 적지 않는다.
# 별도 명령으로 Cloudflare에 암호화 저장:
#   wrangler secret put NAVER_API_KEY
#   wrangler secret put NAVER_SECRET_KEY
#   wrangler secret put NAVER_CUSTOMER_ID
#
# 로컬 개발 시에는 같은 폴더에 .dev.vars 파일을 만들어 사용 (gitignore 처리됨):
#   NAVER_API_KEY=...
#   NAVER_SECRET_KEY=...
#   NAVER_CUSTOMER_ID=...

[vars]
# 공개해도 무방한 설정값만 여기 둔다.
# 허용 Origin은 코드 안에서 화이트리스트로 관리한다.

# D1 데이터베이스 (분석기 웹앱 users 테이블)
# 코드에서 env.DB 로 접근
[[d1_databases]]
binding = "DB"
database_name = "smartsupport-db"
database_id = "7a1e304f-91d9-429b-9d61-8619327b393c"

# 배포 버전 메타데이터 — 코드에서 env.CF_VERSION_METADATA 로 접근. 배포 버전 ID·태그·timestamp 자동 주입
[version_metadata]
binding = "CF_VERSION_METADATA"

# Cron 트리거: UTC 18:00 = KST 03:00 매일 1회 (한국 새벽 시간대 수집)
[triggers]
crons = ["0 18 * * *"]
