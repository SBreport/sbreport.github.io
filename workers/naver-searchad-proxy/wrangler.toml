name = "naver-searchad-proxy"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 비밀 키는 wrangler.toml에 절대 적지 않는다.
# 별도 명령으로 Cloudflare에 암호화 저장:
#   wrangler secret put NAVER_API_KEY
#   wrangler secret put NAVER_SECRET_KEY
#   wrangler secret put NAVER_CUSTOMER_ID
#
# 로컬 개발 시에는 같은 폴더에 .dev.vars 파일을 만들어 사용 (gitignore 처리됨):
#   NAVER_API_KEY=...
#   NAVER_SECRET_KEY=...
#   NAVER_CUSTOMER_ID=...

[vars]
# 공개해도 무방한 설정값만 여기 둔다.
# 허용 Origin은 코드 안에서 화이트리스트로 관리한다.
