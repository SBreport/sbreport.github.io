<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스마트 브랜딩 서포터</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <h1>스마트 브랜딩 서포터</h1>
      <span class="popup-version">v0.1.0</span>
    </header>

    <ul class="feature-list">
      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">글감 패널 숨기기</span>
            <span class="feature-desc">블로그 에디터 우측 패널을 숨깁니다.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="blogCleaner" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">좌측 섹션 네비게이터</span>
            <span class="feature-desc">검색 결과 페이지 좌측에 섹션 목록 표시.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchNavigator" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">블로그 결과 강조</span>
            <span class="feature-desc">검색 결과 중 블로그 항목만 녹색 강조.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchHighlighter" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <div class="feature-sub" data-feature-sub="searchHighlighter">
          <span class="feature-sub-label">색상</span>
          <div class="segmented" data-segmented="searchHighlighterColor">
            <button type="button" data-value="green">녹색</button>
            <button type="button" data-value="yellow">노랑</button>
            <button type="button" data-value="blue">하늘</button>
          </div>
        </div>
      </li>

      <li class="feature-item feature-disabled">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">검색량 표시</span>
            <span class="feature-desc">PC·모바일 검색량 표시. (백엔드 셋업 후 활성)</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchVolume" disabled>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>
    </ul>

    <footer class="popup-footer">
      <span id="statusMessage">설정은 즉시 저장됩니다.</span>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
