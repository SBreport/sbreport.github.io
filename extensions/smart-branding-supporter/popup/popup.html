<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스마트 브랜딩 서포터</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <h1>스마트 브랜딩 서포터</h1>
      <span class="popup-version">v0.5.0</span>
    </header>

    <!-- ── 블로그 전체 캡처 섹션 ─────────────────────────────── -->
    <section class="sbs-capture">
      <div class="sbs-capture-header">
        <span class="sbs-capture-label">캡처 도구</span>
        <button type="button" id="sbsCaptureBtn">블로그 전체 캡처</button>
      </div>
      <div id="sbsCaptureList"></div>
      <div id="sbsCaptureStatus"></div>
    </section>

    <ul class="feature-list">
      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">글감 패널 숨기기</span>
            <span class="feature-desc">블로그 에디터 우측 패널을 숨깁니다.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="blogCleaner" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">좌측 섹션 네비게이터</span>
            <span class="feature-desc">검색 결과 페이지 좌측에 섹션 목록 표시.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchNavigator" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <!-- 위치 picker는 현재 숨김 처리. 향후 노출이 필요하면 hidden 속성 제거 -->
        <div class="feature-sub" data-feature-sub="searchNavigator" hidden>
          <span class="feature-sub-label">위치</span>
          <div class="position-picker" data-segmented="searchNavigatorPosition">
            <button type="button" data-value="auto" class="full-row">자동 (콘텐츠 옆)</button>
            <div class="position-grid">
              <button type="button" data-value="left-top">좌상</button>
              <button type="button" data-value="left-middle">좌중(s)</button>
              <button type="button" data-value="left-bottom">좌중(l)</button>
              <button type="button" data-value="right-top">우상</button>
              <button type="button" data-value="right-middle">우중(s)</button>
              <button type="button" data-value="right-bottom">우중(l)</button>
            </div>
          </div>
        </div>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">블로그 결과 강조</span>
            <span class="feature-desc">검색 결과 중 블로그 항목만 녹색 강조.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchHighlighter" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <div class="feature-sub" data-feature-sub="searchHighlighter">
          <span class="feature-sub-label">색상</span>
          <div class="segmented" data-segmented="searchHighlighterColor">
            <button type="button" data-value="green">녹색</button>
            <button type="button" data-value="yellow">노랑</button>
            <button type="button" data-value="blue">하늘</button>
          </div>
        </div>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">검색량 표시</span>
            <span class="feature-desc">PC·모바일 월간 검색량 표시.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="searchVolume">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>

      <li class="feature-item">
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">연관 검색어 표시</span>
            <span class="feature-desc">검색량 패널 하단 연관 검색어 표시.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="relatedKeywords">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>

      <!-- 블로그 카운트 강조: 기본 ON, 사용자 옵션 노출 안 함 (필요 시 hidden 제거) -->
      <li class="feature-item" hidden>
        <label class="feature-label">
          <div class="feature-text">
            <span class="feature-title">블로그 카운트 강조</span>
            <span class="feature-desc">통합검색 라벨에 블로그 개수 표시.</span>
          </div>
          <input type="checkbox" class="toggle" data-feature="blogCount" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </li>
    </ul>

    <div class="popup-site-cta">
      <button type="button" id="openSiteBtn">스마트브랜딩 웹페이지로 이동 →</button>
    </div>

    <footer class="popup-footer">
      <span id="statusMessage">설정은 즉시 저장됩니다.</span>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
